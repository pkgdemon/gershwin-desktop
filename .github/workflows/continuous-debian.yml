name: continuous-debian

# Debian flavor: build -> gate -> publish. Linux family — the ISO is built INSIDE
# a Debian container (debian:latest, --privileged) with live-build, the pattern
# every Linux flavor follows (devuan -> devuan, debian -> debian, arch -> arch).
# Gate + publish are the shared layer. amd64 only for now (arm64 + the RPi .img
# variant come later, with dual-arch publish support).
# Trigger: targets/debian/** or shared .github/actions/**; README never builds.

on:
  push:
    branches: [main]
    paths: ['targets/debian/**', '.github/actions/**', '.github/workflows/continuous-debian.yml']
  pull_request:
    paths: ['targets/debian/**', '.github/actions/**', '.github/workflows/continuous-debian.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (debian amd64)
    runs-on: ubuntu-latest
    container:
      image: debian:latest
      options: --privileged
      volumes:
        - /proc:/proc
    timeout-minutes: 120
    steps:
      - name: Install live-build toolchain
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            git sudo live-build curl dosfstools parted rsync e2fsprogs kpartx zip \
            xorriso ca-certificates

      - uses: actions/checkout@v4

      - name: Configure + build the live ISO
        run: |
          set -e
          cd targets/debian
          arch=$(uname -m)
          sed -i "s/^#${arch} //g" config/package-lists/hardware.list.chroot || true
          lb config --debian-installer live \
                    --distribution bookworm \
                    --archive-areas "main contrib non-free non-free-firmware" \
                    --initramfs live-boot \
                    --mirror-bootstrap http://deb.debian.org/debian/ \
                    --mirror-chroot http://deb.debian.org/debian/ \
                    --mirror-binary http://deb.debian.org/debian/ \
                    --bootappend-live "boot=live components quiet splash"
          lb build
          iso_file=$(ls *.iso | head -n 1)
          out_name="gershwin-on-debian-$(date -u +%Y%m%d%H%M%S)-$(uname -m).iso"
          mv "$iso_file" "$out_name"
          mkdir -p "$GITHUB_WORKSPACE/out"
          cp "$out_name" "$GITHUB_WORKSPACE/out/"
          ls -lh "$GITHUB_WORKSPACE/out/"

      - uses: actions/upload-artifact@v4
        with:
          name: gershwin-debian-amd64
          path: out
          if-no-files-found: error

  test:
    name: boot + login + screenshot (debian amd64)
    needs: [build]
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Download fresh build artifact
        uses: actions/download-artifact@v4
        with:
          name: gershwin-debian-amd64
          path: artifacts

      - uses: ./.github/actions/screenshot-gate
        with:
          flavor: debian
          iso-dir: artifacts
          arch: amd64

  publish:
    name: publish continuous-debian
    needs: [build, test]
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.build.result == 'success' && needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: gershwin-debian-amd64
          path: dist

      - name: Download screenshot
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: desktop-screenshot
          path: screenshot

      - uses: ./.github/actions/publish-continuous
        with:
          tag: continuous-debian
          title: Debian
          assets-dir: dist
          screenshot: screenshot/gershwin-on-debian.png
          token: ${{ secrets.GITHUB_TOKEN }}
