name: iso-diff
# One-shot diagnostic (workflow_dispatch only): download the OLD published rc ISO
# for a BSD flavor, mount its compressed rootfs inside a FreeBSD VM, and print the
# same du size report the build now emits — so we can diff old-vs-new at directory
# granularity and see exactly what inflated the image. Not part of any build path.
on:
  workflow_dispatch:
    inputs:
      flavor:
        description: which BSD flavor's old rc ISO to inspect
        type: choice
        options: [nextbsd, freebsd, both]
        default: both

jobs:
  inspect:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [nextbsd, freebsd]
    steps:
      - name: Skip if not selected
        id: sel
        run: |
          want='${{ inputs.flavor }}'
          if [ "$want" = "both" ] || [ "$want" = "${{ matrix.flavor }}" ]; then
            echo "go=yes" >> "$GITHUB_OUTPUT"
          else
            echo "go=no" >> "$GITHUB_OUTPUT"
          fi

      - name: Download old published rc ISO
        if: steps.sel.outputs.go == 'yes'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          mkdir -p old
          gh release download "${{ matrix.flavor }}-rc" \
            --repo "${{ github.repository }}" --pattern '*.iso' --dir old
          ls -l old

      - name: Mount rootfs in FreeBSD VM and print du report
        if: steps.sel.outputs.go == 'yes'
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.0"
          usesh: true
          run: |
            set -e
            kldload geom_uzip 2>/dev/null || true
            ISO=$(ls old/*.iso | head -1)
            echo "== inspecting $ISO ($(stat -f %z "$ISO") bytes) =="
            md=$(mdconfig -a -t vnode -f "$ISO")
            mkdir -p /mnt/iso; mount -t cd9660 "/dev/$md" /mnt/iso
            UZIP=$(find /mnt/iso -name '*.uzip' | head -1)
            echo "rootfs image: $UZIP"
            mdr=$(mdconfig -a -t vnode -f "$UZIP")
            for i in 1 2 3 4 5 6; do [ -e "/dev/${mdr}.uzip" ] && break; sleep 1; done
            mkdir -p /mnt/root; mount -r "/dev/${mdr}.uzip" /mnt/root
            R=/mnt/root
            echo "=================== OLD ISO SIZE REPORT (${{ matrix.flavor }}) ==================="
            echo "--- biggest directories in the rootfs (MiB, top 30) ---"
            du -sm $R/usr/local/* $R/Developer $R/System $R/usr/lib $R/boot 2>/dev/null | sort -rn | head -30 || true
            echo "--- inside /usr/local/share (MiB, top 20) ---"
            du -sm $R/usr/local/share/* 2>/dev/null | sort -rn | head -20 || true
            echo "--- inside /usr/local/lib (MiB, top 20) ---"
            du -sm $R/usr/local/lib/* 2>/dev/null | sort -rn | head -20 || true
            echo "--- llvm19 (MiB) ---"; du -sm $R/usr/local/llvm19 2>/dev/null || true
            echo "--- installed packages by flatsize (MiB, top 40) ---"
            chroot $R pkg query '%sb %n-%v' 2>/dev/null | sort -rn | awk '{printf "  %9.1f  %s\n", $1/1048576, $2}' | head -40 || echo "  (pkg db not queryable)"
            echo "--- rootfs total (MiB) ---"; du -sm $R 2>/dev/null || true
            echo "================================================================================="
            umount /mnt/root 2>/dev/null || true
