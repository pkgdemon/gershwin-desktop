name: rc-nextbsd

# Reference flavor for the monorepo: build -> gate -> publish, on EVERY run.
# The build is the only flavor-specific bit (inline, in a FreeBSD VM). Everything
# else is the shared layer every flavor calls: free-disk, screenshot-gate (boot
# + greeter login + desktop-render check, init-agnostic), publish-continuous.
#
# Trigger: this flavor's target (targets/nextbsd/**) or shared actions (.github/actions/**);
# README and other top-level files never build. There is NO "reuse the last ISO"
# fast path — the gate always boots the ISO this run just built, so it can never
# test an image that doesn't exist.

on:
  push:
    branches: [main]
    paths: ['targets/nextbsd/**', '.github/actions/**', '.github/workflows/rc-nextbsd.yml']
  pull_request:
    paths: ['targets/nextbsd/**', '.github/actions/**', '.github/workflows/rc-nextbsd.yml']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build (nextbsd amd64)
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/free-disk

      - name: Build ISO inside FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: "15.1"
          usesh: true
          sync: rsync
          copyback: true
          cpu: 4
          mem: 8192
          prepare: |
            pkg install -y git
          run: |
            set -e
            export TARGET_ARCH=amd64
            export CHANNEL=rc
            export GERSHWIN_REF=main
            /bin/sh ./targets/nextbsd/build.sh
            ls -lh /usr/local/gon-build/iso/
            mkdir -p out
            cp /usr/local/gon-build/iso/*.iso out/

      - uses: actions/upload-artifact@v4
        with:
          name: gershwin-nextbsd-amd64
          path: out
          retention-days: 1
          if-no-files-found: error

  test:
    name: boot + login + screenshot (nextbsd amd64)
    needs: [build]
    if: ${{ needs.build.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Download fresh build artifact
        uses: actions/download-artifact@v4
        with:
          name: gershwin-nextbsd-amd64
          path: artifacts

      # The whole boot -> greeter -> admin login -> desktop-render gate lives in
      # the shared action. It observes the Gershwin greeter/desktop from outside
      # the guest, so it is identical for every flavor (init-agnostic). A failure
      # here fails the job and blocks publish (needs.test.result == 'success').
      - uses: ./.github/actions/screenshot-gate
        with:
          flavor: nextbsd
          iso-dir: artifacts
          arch: amd64

  publish:
    name: publish nextbsd-rc
    # Public release is gated on boot + login + screenshot all passing.
    needs: [build, test]
    if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' && needs.build.result == 'success' && needs.test.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ISO
        uses: actions/download-artifact@v4
        with:
          name: gershwin-nextbsd-amd64
          path: dist

      - name: Download screenshot
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: desktop-screenshot
          path: screenshot

      - uses: ./.github/actions/publish-continuous
        with:
          tag: nextbsd-rc
          title: NextBSD (rc)
          assets-dir: dist
          screenshot: screenshot/gershwin-on-nextbsd.png
          token: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    name: purge run ISO artifact
    needs: [build, test, publish]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Delete this run's ISO/screenshot artifacts (job-handoff only; ISO is on the release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "/repos/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID/artifacts" \
            --jq '.artifacts[] | select(.name != "boot-artifacts") | .id' \
          | while read -r id; do
              gh api -X DELETE "/repos/$GITHUB_REPOSITORY/actions/artifacts/$id" \
                && echo "deleted artifact $id"
            done
